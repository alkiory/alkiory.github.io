# ==============================================================================
# nginx.conf — single source of truth for the non-root runtime design.
#
# This file is copied into the image at build time by the Dockerfile (Stage:
# runner) on top of /etc/nginx/nginx.conf, replacing the nginx:alpine default.
#
# DESIGN: optimized to run as a NON-ROOT user (appuser, uid 1001).
#   - no `user` directive: nginx master is started by the container already as
#     appuser. Once privileges are dropped, trying to re-set them via the
#     `user` directive fails with "Operation not permitted", so we omit it
#     entirely (the comment "do not add a `user` directive here" exists for
#     exactly this reason).
#   - pid /tmp/nginx.pid:        /var/run is owned by root in the base image
#                                and not writable as non-root.
#   - *_temp_path /tmp/...:      /var/lib/nginx is also owned by root in the
#                                base image. Using /tmp (world-writable by
#                                default) avoids having to pre-create and
#                                chown those paths during the build.
#   - access_log/error_log → /dev/{stdout,stderr}: makes `docker logs`
#                                capture nginx output without extra plumbing.
#   - server_tokens off + charset utf-8: minor security/hygiene defaults
#                                shared with most hardened nginx configs.
#
# The server block (listen directives, gzip, security headers, SPA-aware
# try_files) lives in default.conf, included via conf.d/*.conf below. Edit
# default.conf for route-level concerns; edit THIS file only when the
# non-root design assumptions documented above change.
# ==============================================================================

worker_processes 1;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server_tokens off;
    charset utf-8;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    include /etc/nginx/conf.d/*.conf;
}
