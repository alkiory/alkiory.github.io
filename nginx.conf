worker_processes 1;
pid /tmp/nginx.pid;

# NO usar directiva 'user' aquí: el proceso maestro ya corre como appuser,
# intentar cambiar de usuario sin privilegios falla con Operation not permitted.

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Temp paths en /tmp (necesario cuando nginx corre como no-root y /var/lib/nginx no es writable)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server_tokens off;
    charset utf-8;

    # Logs a stdout/stderr para que docker logs los capture
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    include /etc/nginx/conf.d/*.conf;
}
