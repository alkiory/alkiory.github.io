server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache agresivo para assets estáticos con hash
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|webp|ico|svg|woff2?|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML no se cachea (igual que la config de Firebase Hosting)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Fallback estilo SPA. Primero busca archivo físico, luego directorio (con index index.html
    # resuelve /es/blog a /es/blog/index.html). Al final cae a /index.html — coincide con la
    # rewrite de firebase.json; src/pages/index.astro hace redirect a /${defaultLang}/.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acceso a dotfiles y archivos sensibles
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP compatible con Firebase Auth (popup OAuth en accounts.google.com) + Analytics
    # (analytics.js y beacons a google-analytics.com y doubleclick.net).
    # 'unsafe-inline' es necesario porque Astro emite estilos/scripts inline en SSG.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.gstatic.com https://*.googleapis.com https://*.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.google-analytics.com https://*.doubleclick.net wss://*.firebaseio.com; frame-src https://*.firebaseapp.com https://accounts.google.com;" always;
}
