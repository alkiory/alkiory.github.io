# =============================================================================
# default.conf — Astro 5 SSG + i18n — Routing delegado a Nginx
# =============================================================================
# Estructura de URLs generada por Astro con formato 'directory' (default):
#   /dist/index.html                        → /index.html (redirige a /en/)
#   /dist/en/index.html                     → /en/
#   /dist/en/about/index.html               → /en/about/
#   /dist/en/blog/index.html                → /en/blog/
#   /dist/en/blog/[slug]/index.html         → /en/blog/[slug]/
#   /dist/en/portfolio/[slug]/index.html    → /en/portfolio/[slug]/
#   /dist/_astro/[hash].[ext]               → /_astro/[hash].[ext]
#
# try_files maneja todo el enrutado:
#   1. $uri    → archivo exacto (JS, CSS, etc.)
#   2. $uri/   → directorio → sirve index.html dentro
#   3. /index.html → fallback SPA
#
# error_page 404 /index.html captura cualquier 404 y redirige al root.
#
# Los security headers están a nivel server y se heredan a todas las
# locations porque NINGUNA location usa add_header propio.
# =============================================================================

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ======================================================================
    # Security headers (server-level) — se heredan a todas las sublocations
    # ======================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.gstatic.com https://*.googleapis.com https://*.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.google-analytics.com https://*.doubleclick.net wss://*.firebaseio.com; frame-src https://*.firebaseapp.com https://accounts.google.com;" always;

    # Bloquear dotfiles (.git, .env, etc.) excepto .well-known
    location ~* /\.(?!well-known) {
        deny all;
    }

    # Assets con hash de Vite (/_astro/*.[hash].[ext])
    # El hash garantiza cache inmutable; expires 1y es seguro.
    location /_astro/ {
        expires 1y;
    }

    # Media y fuentes sin hash (cambian contenido sin renombrarse)
    location ~* \.(?:png|jpe?g|gif|webp|ico|svg|woff2?|ttf|eot|mp4|pdf|webmanifest)$ {
        expires 30d;
    }

    # ======================================================================
    # Routing principal: Nginx maneja todas las rutas
    # ======================================================================
    # Orden: archivo exacto → directorio (index.html) → fallback a root
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Catch-all 404 → /index.html (recupera refrescos en rutas profundas)
    error_page 404 /index.html;
}
