# =============================================================================
# default.conf — Astro 5 SSG + i18n
# =============================================================================
# Estructura de URLs generada por Astro con default 'directory' format:
#   /dist/index.html                              → /
#   /dist/en/index.html                           → /en/, /en
#   /dist/en/about/index.html                     → /en/about, /en/about/
#   /dist/_astro/[name].[hash].js                 → /_astro/[name].[hash].js
#
# Decisiones clave:
#  1. Usamos `expires` (no `add_header Cache-Control`) en las locations de
#     assets. Razón: en nginx, si una `location` define sus propios
#     `add_header`, los `add_header` del nivel server NO se heredan, lo que
#     deja los assets sin X-Frame-Options/CSP/Referrer-Policy. Con `expires`
#     la herencia se preserva.
#  2. try_files cubre tres casos: archivo físico, directorio (que dispara
#     `index index.html`), y `.html` directo (defensivo si build format es
#     'file'). El último fallback es /index.html (root redirect a /en/).
#  3. server_name _ captura alkiory.com y cualquier otro host que NPM forwarde.
# =============================================================================

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Seguridad: bloquear dotfiles y archivos de control de versiones (~* insensitive).
    location ~* /\.(?!well-known) {
        deny all;
    }

    # Assets con hash de Vite (/_astro/*.{js,mjs,css,woff*,map,...}).
    # El hash en el filename garantiza cache seguro; `expires 1y` basta.
    # Importante: NO usar `add_header Cache-Control` aquí, porque en nginx los
    # add_header de location bloquean la herencia de los add_header server-level
    # (security headers / CSP) a las respuestas de este bloque.
    location ~* ^/_astro/ {
        expires 1y;
        try_files $uri =404;
    }

    # Media y fuentes sin hash (cambian contenido sin renombrarse).
    location ~* \.(?:png|jpe?g|gif|webp|ico|svg|woff2?|ttf|eot|mp4|pdf|webmanifest)$ {
        expires 30d;
        try_files $uri =404;
    }

    # HTML directo (caso borde: build format 'file' en astro.config.mjs).
    # `expires epoch` emite Cache-Control: no-cache + Expires: <epoch 1970> --
    # semántica equivalente al `no-cache, no-store, must-revalidate` original
    # que matcheaba con la config de Firebase hosting. Sin add_header para
    # preservar herencia de security headers.
    location ~* \.html$ {
        expires epoch;
        try_files $uri =404;
    }

    # SPA-like fallback para Astro SSG (ya tiene `index index.html`).
    # Orden: URI exacta → URI/ que dispara index.html → URI.html (file format)
    # → /index.html (root redirect a /${defaultLang}/).
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ==========================================================================
    # Headers de seguridad (server-level). Se heredan a `location /` y a las
    # locations que NO tienen sus propios `add_header`.
    # ==========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP para Firebase Auth (popup OAuth en accounts.google.com) + Analytics
    # (analytics.js y beacons a google-analytics.com y doubleclick.net).
    # 'unsafe-inline' es necesario: Astro emite estilos/scripts inline en SSG.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.gstatic.com https://*.googleapis.com https://*.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.google-analytics.com https://*.doubleclick.net wss://*.firebaseio.com; frame-src https://*.firebaseapp.com https://accounts.google.com;" always;
}
