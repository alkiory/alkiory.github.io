# Compresión gzip para recursos de texto
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Oculta la versión del servidor
    server_tokens off;

    # Reconstruye X-Forwarded-* desde Nginx Proxy Manager para que los
    # access logs reflejen la IP real del cliente
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;

    # Headers de seguridad básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache largo para assets con hash (Astro emite _astro/* con hash en el nombre)
    location ~* ^/_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Bloquea archivos ocultos por seguridad
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Redirige la raíz exacta (`/`) al locale por defecto (`/en/`) ANTES
    # de que `location /` intente servir `try_files $uri $uri/`. Sin este
    # bloque, `try_files` resolvería `$uri = /` a
    # `/usr/share/nginx/html/index.html` — que es el HTML meta-refresh
    # emitido por `Astro.redirect('/en/')` en SSG — y el visitante
    # vería brevemente la página "Redirecting..." antes del salto.
    #
    # El modificador `=` da prioridad máxima al match exacto sobre el
    # prefijo `location /`, así que el cliente recibe un HTTP 301 limpio
    # sin que se sirva ningún HTML intermedio.
    #
    # 301 (no 302) para SEO: comunica a los buscadores que la raíz del
    # sitio vive permanentemente en `/en/`. Trade-off: navegadores y
    # CDNs cachean 301 agresivamente — si en el futuro cambia el locale
    # por defecto, los visitantes con el redirect en caché seguirán
    # yendo a `/en/` hasta purgar caché (usar 302 si anticipas cambiar
    # el default).
    location = / {
        return 301 /en/;
    }

    # Resolución robusta de rutas para Astro SSG:
    # 1) $uri como archivo estático (assets, favicon, etc.)
    # 2) $uri/ como directorio + index.html (Astro directory format con trailingSlash:'always')
    # 3) $uri.html como archivo (Astro file format fallback)
    # 4) Locale-specific 404: dist/en/404/index.html (default locale)
    # 5) Generic 404 fallbacks: dist/404/index.html y dist/404.html
    # 6) =404 si nada matchea
    #
    # NOTA: rehúye del patrón anterior `try_files ... /index.html` porque
    # dist/index.html es el redirect-HTML de src/pages/index.astro
    # (Astro.redirect('/en/')) — cuando el navegador navegaba a una ruta
    # que Astro no emitió (p.ej. mismatch de trailing slash al combinar
    # manual [lang]/ con i18n routing), nginx devolvía ese HTML y el
    # usuario "rebotaba" a /en/ — eso era exactamente el síntoma de
    # "se rompe la navegación al hacer click en el segundo enlace".
    location / {
        try_files $uri $uri/ $uri.html /en/404/index.html /404/index.html /404.html =404;
    }

    # Sirve la página custom 404 de Astro con status 404 explícito
    error_page 404 /en/404/index.html;
    location = /en/404/index.html {
        internal;
    }
}
