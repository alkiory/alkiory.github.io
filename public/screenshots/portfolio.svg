<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Alkiory Portfolio — portfolio index preview">
  <title>Alkiory Portfolio — portfolio index preview</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f4f7" />
      <stop offset="1" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c561f6" />
      <stop offset="0.55" stop-color="#7611a6" />
      <stop offset="1" stop-color="#1c0056" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f3f4f7" />
    </linearGradient>
    <linearGradient id="thumb-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c561f6" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="thumb-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c0056" />
      <stop offset="1" stop-color="#7611a6" />
    </linearGradient>
    <linearGradient id="thumb-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="thumb-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7611a6" />
      <stop offset="1" stop-color="#c561f6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1c0056" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- NAV -->
  <g font-family="Rubik, system-ui, sans-serif">
    <g transform="translate(40, 28)">
      <rect x="0" y="-12" width="22" height="22" rx="5" fill="#7611a6" />
      <rect x="5" y="-7" width="12" height="2" fill="#ffffff" />
      <rect x="5" y="-3" width="9" height="2" fill="#ffffff" />
      <text x="32" y="0" font-size="16" font-weight="700" fill="#1c0056">Alkiory Dev</text>
    </g>

    <g transform="translate(420, 22)">
      <rect x="0" y="0" width="360" height="32" rx="16" fill="#ffffff" stroke="#e3e6ee" filter="url(#shadow)" />
      <text x="60" y="20" font-size="11" font-weight="500" fill="#283044" text-anchor="middle">Home</text>
      <rect x="88" y="4" width="68" height="24" rx="12" fill="#7611a6" />
      <text x="122" y="20" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Portfolio</text>
      <text x="180" y="20" font-size="11" font-weight="500" fill="#283044" text-anchor="middle">Blog</text>
      <text x="240" y="20" font-size="11" font-weight="500" fill="#283044" text-anchor="middle">About</text>
      <text x="300" y="20" font-size="11" font-weight="500" fill="#283044" text-anchor="middle">Contact</text>
    </g>

    <g transform="translate(1070, 22)" font-size="11">
      <circle cx="10" cy="8" r="14" fill="#ffffff" stroke="#e3e6ee" />
      <text x="10" y="12" font-weight="600" fill="#283044" text-anchor="middle">EN</text>
      <circle cx="50" cy="8" r="14" fill="#ffffff" stroke="#e3e6ee" />
      <path d="M50 1 a7 7 0 0 1 0 14 z" fill="#1c0056" />
    </g>
  </g>

  <!-- HERO -->
  <g transform="translate(70, 100)" font-family="Rubik, system-ui, sans-serif">
    <text font-size="11" font-weight="700" letter-spacing="2" fill="#6474a2">PORTFOLIO</text>
    <text y="44" font-size="40" font-weight="700" fill="#283044">Featured projects</text>
    <text y="84" font-size="40" font-weight="700" fill="#283044">across teams and stacks.</text>
    <text y="116" font-size="14" font-weight="500" fill="#6474a2">From whiteboards to deploys — pick one to dive in.</text>
  </g>

  <!-- CARDS: 4 project tiles -->
  <!-- Tile A (top-left) -->
  <g transform="translate(70, 260)" filter="url(#shadow)">
    <rect width="540" height="160" rx="20" fill="url(#card)" stroke="#e3e6ee" />
    <rect x="16" y="16" width="160" height="128" rx="14" fill="url(#thumb-a)" />
    <rect x="32" y="40" width="80" height="6" fill="#ffffff" opacity="0.6" />
    <rect x="32" y="52" width="60" height="6" fill="#ffffff" opacity="0.4" />
    <circle cx="148" cy="120" r="14" fill="#ffffff" opacity="0.6" />
    <text x="194" y="42" font-size="14" font-weight="700" fill="#283044">Home Lab Dashboard</text>
    <text x="194" y="64" font-size="11" fill="#6474a2">Personal infrastructure as code</text>
    <text x="194" y="86" font-size="11" fill="#3d4663">A self-hosted observability stack</text>
    <text x="194" y="100" font-size="11" fill="#3d4663">running on a single Raspberry Pi.</text>
    <g transform="translate(194, 110)">
      <rect width="42" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="21" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">devops</text>
    </g>
    <g transform="translate(244, 110)">
      <rect width="44" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="22" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">node</text>
    </g>
    <g transform="translate(296, 110)">
      <rect width="64" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="32" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">grafana</text>
    </g>
  </g>

  <!-- Tile B (top-right) -->
  <g transform="translate(640, 260)" filter="url(#shadow)">
    <rect width="480" height="160" rx="20" fill="url(#card)" stroke="#e3e6ee" />
    <rect x="16" y="16" width="160" height="128" rx="14" fill="url(#thumb-b)" />
    <rect x="32" y="40" width="100" height="6" fill="#ffffff" opacity="0.6" />
    <rect x="32" y="52" width="70" height="6" fill="#ffffff" opacity="0.4" />
    <rect x="130" y="100" width="36" height="36" rx="6" fill="#ffffff" opacity="0.4" />
    <text x="194" y="42" font-size="14" font-weight="700" fill="#283044">Marvel anniversary site</text>
    <text x="194" y="64" font-size="11" fill="#6474a2">Editorial / marketing build</text>
    <text x="194" y="86" font-size="11" fill="#3d4663">A playful scroll-driven look at</text>
    <text x="194" y="100" font-size="11" fill="#3d4663">a fictional anniversary event.</text>
    <g transform="translate(194, 110)">
      <rect width="42" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="21" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">a11y</text>
    </g>
    <g transform="translate(244, 110)">
      <rect width="40" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="20" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">css</text>
    </g>
  </g>

  <!-- Tile C (bottom-left) -->
  <g transform="translate(70, 440)" filter="url(#shadow)">
    <rect width="540" height="160" rx="20" fill="url(#card)" stroke="#e3e6ee" />
    <rect x="16" y="16" width="160" height="128" rx="14" fill="url(#thumb-c)" />
    <circle cx="88" cy="80" r="40" fill="#ffffff" opacity="0.5" />
    <circle cx="92" cy="74" r="20" fill="#ffffff" opacity="0.7" />
    <text x="194" y="42" font-size="14" font-weight="700" fill="#283044">Video chat platform</text>
    <text x="194" y="64" font-size="11" fill="#6474a2">Realtime + WebRTC exploration</text>
    <text x="194" y="86" font-size="11" fill="#3d4663">End-to-end low-latency rooms with</text>
    <text x="194" y="100" font-size="11" fill="#3d4663">permissioned peers + screen share.</text>
    <g transform="translate(194, 110)">
      <rect width="40" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="20" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">rtc</text>
    </g>
    <g transform="translate(242, 110)">
      <rect width="42" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="21" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">node</text>
    </g>
    <g transform="translate(292, 110)">
      <rect width="60" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="30" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">firebase</text>
    </g>
  </g>

  <!-- Tile D (bottom-right) -->
  <g transform="translate(640, 440)" filter="url(#shadow)">
    <rect width="480" height="160" rx="20" fill="url(#card)" stroke="#e3e6ee" />
    <rect x="16" y="16" width="160" height="128" rx="14" fill="url(#thumb-d)" />
    <rect x="48" y="48" width="100" height="64" rx="8" fill="#ffffff" opacity="0.55" />
    <rect x="56" y="56" width="84" height="6" fill="#7611a6" opacity="0.6" />
    <rect x="56" y="68" width="60" height="4" fill="#7611a6" opacity="0.4" />
    <text x="194" y="42" font-size="14" font-weight="700" fill="#283044">TimeSheet fullstack</text>
    <text x="194" y="64" font-size="11" fill="#6474a2">SaaS · team productivity</text>
    <text x="194" y="86" font-size="11" fill="#3d4663">Multi-tenant tracking with team-</text>
    <text x="194" y="100" font-size="11" fill="#3d4663">level rollups and CSV exports.</text>
    <g transform="translate(194, 110)">
      <rect width="46" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="23" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">angular</text>
    </g>
    <g transform="translate(248, 110)">
      <rect width="50" height="14" rx="7" fill="url(#accent)" opacity="0.18" />
      <text x="25" y="10" font-size="9" font-weight="600" fill="#7611a6" text-anchor="middle">postgres</text>
    </g>
  </g>

  <!-- Bottom strip: status -->
  <g transform="translate(70, 618)" font-family="system-ui">
    <text x="0" y="0" font-size="9" fill="#a3acc8">SVG mock — replace with `pnpm screenshots`</text>
    <text x="1130" y="0" font-size="9" fill="#a3acc8" text-anchor="end">8 projects · EN locale</text>
  </g>
</svg>
