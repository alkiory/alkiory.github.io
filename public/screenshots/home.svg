<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Alkiory Portfolio — home page preview">
  <title>Alkiory Portfolio — home page preview</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f4f7" />
      <stop offset="1" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c561f6" />
      <stop offset="0.55" stop-color="#7611a6" />
      <stop offset="1" stop-color="#1c0056" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f4f7" />
      <stop offset="1" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="0.5" stop-color="#a855f7" />
      <stop offset="1" stop-color="#c084fc" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1c0056" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- NAV -->
  <g font-family="Rubik, system-ui, -apple-system, 'Segoe UI', sans-serif">
    <g transform="translate(40, 28)">
      <rect x="0" y="-12" width="22" height="22" rx="5" fill="#7611a6" />
      <rect x="5" y="-7" width="12" height="2" fill="#ffffff" />
      <rect x="5" y="-3" width="9" height="2" fill="#ffffff" />
      <text x="32" y="0" font-size="16" font-weight="700" fill="#1c0056">Alkiory Dev</text>
    </g>

    <!-- centred nav pill -->
    <g transform="translate(420, 22)">
      <rect x="0" y="0" width="360" height="32" rx="16" fill="#ffffff" stroke="#e3e6ee" filter="url(#shadow)" />
      <rect x="36" y="4" width="48" height="24" rx="12" fill="#7611a6" />
      <text x="60" y="20" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Home</text>
      <text x="120" y="20" font-size="11" font-weight="500" fill="#283044" text-anchor="middle">Portfolio</text>
      <text x="180" y="20" font-size="11" font-weight="500" fill="#283044" text-anchor="middle">Blog</text>
      <text x="240" y="20" font-size="11" font-weight="500" fill="#283044" text-anchor="middle">About</text>
      <text x="300" y="20" font-size="11" font-weight="500" fill="#283044" text-anchor="middle">Contact</text>
    </g>

    <!-- language + theme toggles -->
    <g transform="translate(1070, 22)" font-size="11">
      <circle cx="10" cy="8" r="14" fill="#ffffff" stroke="#e3e6ee" />
      <text x="10" y="12" font-weight="600" fill="#283044" text-anchor="middle">EN</text>
      <circle cx="50" cy="8" r="14" fill="#ffffff" stroke="#e3e6ee" />
      <path d="M50 1 a7 7 0 0 1 0 14 z" fill="#1c0056" />
    </g>
  </g>

  <!-- HERO (left) -->
  <g transform="translate(70, 110)" font-family="Rubik, system-ui, sans-serif">
    <text font-size="11" font-weight="700" letter-spacing="2" fill="#6474a2">WELCOME TO MY PORTFOLIO</text>
    <text y="44" font-size="40" font-weight="700" fill="#283044">Build, learn, share.</text>
    <text y="74" font-size="14" font-weight="500" fill="#6474a2">Explore my latest projects and articles.</text>

    <!-- Role pills -->
    <g transform="translate(0, 96)">
      <g>
        <rect width="102" height="28" rx="14" fill="#ffffff" stroke="#e3e6ee" />
        <circle cx="16" cy="14" r="6" fill="#7611a6" />
        <text x="30" y="18" font-size="11" font-weight="600" fill="#283044">Developer</text>
      </g>
      <g transform="translate(110, 0)">
        <rect width="62" height="28" rx="14" fill="#ffffff" stroke="#e3e6ee" />
        <circle cx="16" cy="14" r="6" fill="#7611a6" />
        <text x="30" y="18" font-size="11" font-weight="600" fill="#283044">Biker</text>
      </g>
      <g transform="translate(180, 0)">
        <rect width="74" height="28" rx="14" fill="#ffffff" stroke="#e3e6ee" />
        <circle cx="16" cy="14" r="6" fill="#7611a6" />
        <text x="30" y="18" font-size="11" font-weight="600" fill="#283044">Gamer</text>
      </g>
      <g transform="translate(262, 0)">
        <rect width="68" height="28" rx="14" fill="#ffffff" stroke="#e3e6ee" />
        <circle cx="16" cy="14" r="6" fill="#7611a6" />
        <text x="30" y="18" font-size="11" font-weight="600" fill="#283044">Video</text>
      </g>
    </g>

    <!-- Status badge -->
    <g transform="translate(0, 142)">
      <rect width="240" height="34" rx="17" fill="url(#accent)" />
      <circle cx="22" cy="17" r="5" fill="#22d3ee" />
      <text x="38" y="22" font-size="12" font-weight="700" fill="#ffffff">Available for projects</text>
    </g>

    <!-- Stats card -->
    <g transform="translate(0, 192)">
      <rect width="540" height="110" rx="22" fill="url(#card)" stroke="#e3e6ee" filter="url(#shadow)" />
      <g>
        <text x="135" y="58" font-size="36" font-weight="700" fill="#7611a6" text-anchor="middle" font-family="Rubik">9+</text>
        <text x="135" y="84" font-size="11" font-weight="500" fill="#6474a2" text-anchor="middle">years writing code</text>
      </g>
      <line x1="270" y1="22" x2="270" y2="88" stroke="#e3e6ee" />
      <g>
        <text x="405" y="58" font-size="36" font-weight="700" fill="#7611a6" text-anchor="middle" font-family="Rubik">67+</text>
        <text x="405" y="84" font-size="11" font-weight="500" fill="#6474a2" text-anchor="middle">projects delivered</text>
      </g>
      <g transform="translate(170, 96)">
        <rect width="200" height="6" rx="3" fill="url(#accent)" opacity="0.7" />
      </g>
    </g>
  </g>

  <!-- HERO image frame (right) -->
  <g transform="translate(740, 110)" filter="url(#shadow)">
    <rect width="380" height="450" rx="40" fill="#e3e6ee" />
    <circle cx="190" cy="170" r="105" fill="#c561f6" opacity="0.32" />
    <ellipse cx="190" cy="225" rx="125" ry="150" fill="#7611a6" opacity="0.45" />
    <ellipse cx="190" cy="380" rx="155" ry="40" fill="#1c0056" />
    <rect x="20" y="390" width="340" height="44" rx="14" fill="#1c0056" opacity="0.85" />
    <text x="190" y="416" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="system-ui">shirotaka_rudeus.jpg · 480×620</text>
  </g>

  <!-- BOTTOM strip: works + blog + timeline mini -->
  <g transform="translate(70, 540)" font-family="Rubik, system-ui, sans-serif">
    <rect width="640" height="68" rx="16" fill="#ffffff" stroke="#e3e6ee" filter="url(#shadow)" />
    <rect x="14" y="14" width="40" height="40" rx="10" fill="url(#accent)" />
    <text x="68" y="30" font-size="13" font-weight="700" fill="#283044">Selected Works</text>
    <text x="68" y="48" font-size="10" fill="#6474a2">Here are some of my featured projects.</text>
    <g transform="translate(220, 18)">
      <rect width="100" height="32" rx="8" fill="#7611a6" />
      <text x="50" y="20" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">View all →</text>
    </g>
    <g transform="translate(340, 18)">
      <rect width="60" height="32" rx="8" fill="url(#card)" stroke="#e3e6ee" />
      <rect y="6" width="60" height="6" fill="url(#accent)" opacity="0.5" />
      <rect x="68" width="60" height="32" rx="8" fill="url(#card)" stroke="#e3e6ee" />
      <rect x="68" y="6" width="60" height="6" fill="url(#accent)" opacity="0.5" />
      <rect x="136" width="60" height="32" rx="8" fill="url(#card)" stroke="#e3e6ee" />
      <rect x="136" y="6" width="60" height="6" fill="url(#accent)" opacity="0.5" />
      <rect x="204" width="60" height="32" rx="8" fill="url(#card)" stroke="#e3e6ee" />
      <rect x="204" y="6" width="60" height="6" fill="url(#accent)" opacity="0.5" />
    </g>
  </g>

  <g transform="translate(820, 540)" font-family="system-ui">
    <rect width="280" height="68" rx="16" fill="#ffffff" stroke="#e3e6ee" filter="url(#shadow)" />
    <line x1="34" y1="10" x2="34" y2="58" stroke="url(#rail)" stroke-width="3" stroke-linecap="round" />
    <circle cx="34" cy="20" r="6" fill="#22d3ee" />
    <circle cx="34" cy="40" r="6" fill="#a855f7" />
    <circle cx="34" cy="58" r="4" fill="#c084fc" />
    <text x="56" y="24" font-size="12" font-weight="700" fill="#283044" font-family="Rubik">Work Experience</text>
    <text x="56" y="42" font-size="10" fill="#6474a2">9+ years · featured timeline</text>
    <text x="56" y="56" font-size="10" fill="#6474a2">gradient rail + scroll fill</text>
  </g>

  <!-- Template preview watermark -->
  <text x="1180" y="618" font-size="9" fill="#a3acc8" text-anchor="end" font-family="system-ui">SVG mock — replace with `pnpm screenshots`</text>
</svg>
