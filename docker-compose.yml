services:
  alkiory-portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: alkiory:${TAG:-latest}
    container_name: alkiory-portfolio
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - npm_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  npm_network:
    external: true
